databases:
  - name: forgerealm-pos-db
    plan: free
    databaseName: forgerealm_pos

services:
  - type: web
    name: forgerealm-pos
    plan: free
    runtime: node
    buildCommand: npm run install:all && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: forgerealm-pos-db
          property: connectionString
      - key: NODE_ENV
        value: production
    staticPublishPath: ./client/dist
